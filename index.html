<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎮 Rock Paper Scissors Battle</h1>
    <p class="subtitle">Best of 5 Rounds</p>

    <div class="choices">

        <button class="choice" data-choice="rock">
            <img src="images/rock.png" alt="Rock">
            <span>Rock</span>
        </button>

        <button class="choice" data-choice="paper">
            <img src="images/paper.png" alt="Paper">
            <span>Paper</span>
        </button>

        <button class="choice" data-choice="scissors">
            <img src="images/scissors.png" alt="Scissors">
            <span>Scissors</span>
        </button>

    </div>

    <div class="result-box">
        <h2 id="result">Choose your move!</h2>

        <p>You: <span id="playerChoice">-</span></p>
        <p>Computer: <span id="computerChoice">-</span></p>
    </div>

    <div class="scoreboard">
        <h2>🏆 Scoreboard</h2>

        <p>Player: <span id="playerScore">0</span></p>
        <p>Computer: <span id="computerScore">0</span></p>
        <p>Round: <span id="round">1</span>/5</p>
    </div>

    <button id="resetBtn">🔄 Play Again</button>

    <div class="stats">
        <h2>📊 Statistics</h2>

        <p>Games Played: <span id="gamesPlayed">0</span></p>
        <p>Wins: <span id="wins">0</span></p>
        <p>Losses: <span id="losses">0</span></p>
        <p>Draws: <span id="draws">0</span></p>
        <p>Win Rate: <span id="winRate">0</span>%</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
